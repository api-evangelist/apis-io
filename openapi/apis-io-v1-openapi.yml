openapi: 3.1.0
info:
  title: APIs.io API
  version: 1.1.0
  summary: Read-only discovery API over the APIs.io catalog of providers, APIs, tags, artifacts, and curated dimensions — with a free discovery tier and a Pro synthesis tier.
  description: |
    A first-class, read-only discovery API over the [APIs.io](https://apis.io) network.

    The catalog is assembled from per-provider repositories and exposed here as the
    **providers**, **apis**, and **tags** resources, a **first-class collection per
    artifact type** (`/openapis`, `/asyncapis`, `/arazzo`, `/postman`, `/json-schemas`, …),
    and a unified `/search` endpoint that spans them.

    Design notes:
    - **Identifiers.** `aid` is the stable id. A provider is `twilio`; an API is
      `twilio:twilio-accounts-api` (`<provider>:<api-slug>`).
    - **Artifacts by reference.** API records carry a `properties` list of artifacts
      (`type` + `url`). By default only references are returned; pass `include=content`
      to inline an artifact's body.
    - **Selectable artifacts.** Use `artifact_types` to return only the artifact types
      you care about (e.g. `OpenAPI,Postman`).
    - **Free vs. Pro tiers.** Raw discovery — `/search`, `/providers`, `/apis`, `/tags`, and
      every artifact-type collection (`/openapis`, `/mcp`, `/scopes`, `/examples`, `/schemas`, …)
      — is **free**. The curated taxonomy dimensions (`/industries`, `/regions`, `/areas`), the
      rating **data** (`/ratings`, `/providers/{slug}/rating`), and the synthesis composites
      (`/compare`, `/gaps`, `/changes`, `/stack`) are **Pro**. Each operation declares its tier
      via `x-tier`; the rubric (`/ratings/rubric`) stays free. Send `X-API-Key` for a paid tier;
      keyless callers get the free tier. See `x-apis-io` for the full tier / MCP-tool / skill map.
    - **Also an MCP server + Agent Skills.** Every operation maps 1:1 to an MCP tool at
      `https://apis.io/mcp` (see each operation's `x-mcp-tool`) and, where one exists, an
      Agent Skill (`x-agent-skill`). This is the API → MCP → Agent-Skill experience chain.
  contact:
    name: API Evangelist
    url: https://apis.io
  license:
    name: CC BY 4.0
    url: https://creativecommons.org/licenses/by/4.0/
  x-logo:
    url: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg

# Authoritative machine-readable map of the API's DX/AX surface: the tier model, and for every
# operation its tier, MCP tool, and Agent Skill (where one exists). Rendered by the API Experience
# tool (experience.apicommons.org) as the API -> MCP -> Agent-Skill journey + a free/paid coverage
# view. Kept in sync with the deployed gating (lambdas/search/index.mjs GATED set) and MCP tools
# (lambdas/mcp/index.mjs) in apis-io-aws. Per-operation `x-tier`/`x-mcp-tool`/`x-agent-skill`
# repeat the relevant row inline; this block is the single source Part B reads.
x-apis-io:
  tiers:
    free:
      label: Free
      description: Raw discovery — search, providers, apis, tags, and every artifact-type collection. Keyless.
    pro:
      label: Pro
      description: Curated dimensions (industries/regions/areas), rating data, and synthesis composites. Requires X-API-Key.
      plans: https://apis.io/developer/plans/
  mcp:
    endpoint: https://apis.io/mcp
    serverCard: https://apis.io/.well-known/mcp/server-card.json
  agentSkills:
    index: https://apis.io/.well-known/agent-skills/index.json
  # operationId -> { tier, mcpTool, agentSkill }. agentSkill omitted where none exists yet (a gap
  # the coverage view surfaces on purpose).
  operations:
    listProviders:    { tier: free, mcpTool: find_providers,      agentSkill: find-api }
    getProvider:      { tier: free, mcpTool: get_provider,        agentSkill: provider-overview }
    listProviderApis: { tier: free, mcpTool: get_provider }
    listApis:         { tier: free, mcpTool: find_apis,           agentSkill: find-api }
    getApi:           { tier: free, mcpTool: get_api,             agentSkill: explain-artifact }
    listTags:         { tier: free, mcpTool: find_tags }
    getTag:           { tier: free, mcpTool: get_tag }
    listOpenapis:     { tier: free, mcpTool: find_artifacts }
    listAsyncapis:    { tier: free, mcpTool: find_artifacts }
    listArazzo:       { tier: free, mcpTool: find_artifacts }
    listPostman:      { tier: free, mcpTool: find_artifacts }
    listCollections:  { tier: free, mcpTool: find_artifacts }
    listGraphql:      { tier: free, mcpTool: find_artifacts }
    listJsonSchemas:  { tier: free, mcpTool: find_artifacts }
    listJsonStructures: { tier: free, mcpTool: find_artifacts }
    listJsonLd:       { tier: free, mcpTool: find_artifacts }
    listVocabularies: { tier: free, mcpTool: find_artifacts }
    listRules:        { tier: free, mcpTool: find_artifacts }
    listExamples:     { tier: free, mcpTool: find_artifacts }
    listFinops:       { tier: free, mcpTool: find_artifacts }
    listPlans:        { tier: free, mcpTool: find_artifacts }
    listRateLimits:   { tier: free, mcpTool: find_artifacts }
    listChannels:     { tier: free, mcpTool: find_artifacts }
    listMcpServers:   { tier: free, mcpTool: find_artifacts }
    listSkills:       { tier: free, mcpTool: find_artifacts }
    listScopes:       { tier: free, mcpTool: find_artifacts }
    listSecurity:     { tier: free, mcpTool: find_artifacts }
    search:           { tier: free, mcpTool: apis_io_search,     agentSkill: find-api }
    getRatingRubric:  { tier: free, mcpTool: get_rating_rubric }
    listIndustries:   { tier: pro,  mcpTool: find_industries }
    getIndustry:      { tier: pro,  mcpTool: get_industry }
    listRegions:      { tier: pro,  mcpTool: find_regions }
    getRegion:        { tier: pro,  mcpTool: get_region }
    listAreas:        { tier: pro,  mcpTool: find_areas }
    getArea:          { tier: pro,  mcpTool: get_area }
    listRatings:      { tier: pro,  mcpTool: find_ratings }
    getProviderRating: { tier: pro, mcpTool: get_provider_rating }
    compareProviders: { tier: pro,  mcpTool: compare_providers,  agentSkill: design-api-stack }
    gapAnalysis:      { tier: pro,  mcpTool: gap_analysis }
    whatsChanged:     { tier: pro,  mcpTool: whats_changed }
    recommendStack:   { tier: free, mcpTool: recommend_stack,    agentSkill: design-api-stack, note: Free returns a top-pick preview; Pro returns alternatives + gaps + exportable APIs.json. }

servers:
  - url: https://apis.io/api/v1
    description: Production server.

tags:
  - name: Providers
    description: Organizations publishing APIs on the network.
  - name: APIs
    description: Individual APIs, each owned by a provider and described by artifacts.
  - name: Tags
    description: The tag taxonomy, with network-wide ranking metadata.
  - name: Industries
    description: Industry verticals grouping providers across the catalog.
  - name: Regions
    description: Geographic regions grouping providers across the catalog.
  - name: Areas
    description: The API Evangelist areas taxonomy — curated topic collections (authentication, webhooks, payments, …), each a scored provider index with its own site. Pro.
  - name: Synthesis
    description: Decision-grade composites over the catalog — provider comparison, gap analysis, catalog change feed, and recommended-stack design. Pro.
  - name: Ratings
    description: The APIs.io API rating system — a 0–100 composite score, five bands, a trend marker, and six weighted facets measuring how complete, governed, and integration-ready each provider's public API surface is. Rubric v0.3.
  - name: Artifact Types
    description: First-class, per-type artifact collections (OpenAPI, AsyncAPI, Arazzo, Postman, JSON Schema, and more). Each path filters and normalizes one artifact type across all providers.
  - name: Search
    description: Unified cross-resource search.

# Defined but NOT required in v1 (key-ready, see info.description).
security: []

paths:

  /providers:
    get:
      operationId: listProviders
      tags:
        - Providers
      summary: List and filter providers.
      description: List providers, optionally filtered by free text, tags, or the artifact types they publish.
      parameters:
        - $ref: '#/components/parameters/Q'
        - $ref: '#/components/parameters/Tags'
        - $ref: '#/components/parameters/Match'
        - $ref: '#/components/parameters/ArtifactTypes'
        - $ref: '#/components/parameters/IndustryFilter'
        - $ref: '#/components/parameters/RegionFilter'
        - $ref: '#/components/parameters/BandFilter'
        - $ref: '#/components/parameters/MinScore'
        - $ref: '#/components/parameters/MaxScore'
        - $ref: '#/components/parameters/TrendFilter'
        - $ref: '#/components/parameters/FacetFilter'
        - $ref: '#/components/parameters/MinFacet'
        - name: sort
          in: query
          description: Sort order.
          schema:
            type: string
            enum:
              - relevance
              - name
              - api_count
              - created
              - score
            default: relevance
        - $ref: '#/components/parameters/Fields'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A page of providers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderList'
        '400':
          $ref: '#/components/responses/BadRequest'

  /providers/{slug}:
    get:
      operationId: getProvider
      tags:
        - Providers
      summary: Get one provider.
      description: Returns a single provider by slug, including its provider-wide links, tags, and a summary list of the APIs it publishes.
      parameters:
        - $ref: '#/components/parameters/ProviderSlug'
        - $ref: '#/components/parameters/Fields'
      responses:
        '200':
          description: The provider.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Provider'
        '404':
          $ref: '#/components/responses/NotFound'

  /providers/{slug}/apis:
    get:
      operationId: listProviderApis
      tags:
        - Providers
        - APIs
      summary: List the APIs published by a provider.
      description: Returns a page of the APIs owned by one provider, optionally filtered by tags and required artifact types. Pass `include=content` to inline artifact bodies.
      parameters:
        - $ref: '#/components/parameters/ProviderSlug'
        - $ref: '#/components/parameters/Tags'
        - $ref: '#/components/parameters/Match'
        - $ref: '#/components/parameters/ArtifactTypes'
        - $ref: '#/components/parameters/Include'
        - $ref: '#/components/parameters/Fields'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A page of the provider's APIs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiList'
        '404':
          $ref: '#/components/responses/NotFound'

  /providers/{slug}/rating:
    get:
      operationId: getProviderRating
      x-tier: pro
      x-mcp-tool: get_provider_rating
      security:
        - ApiKeyAuth: []
      tags:
        - Ratings
      summary: One provider's rating.
      description: Returns the full rating breakdown for a single provider — composite, band, trend, delta, and all six facet scores.
      parameters:
        - $ref: '#/components/parameters/ProviderSlug'
      responses:
        '200':
          description: One provider's rating.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProviderScore'
        '404':
          $ref: '#/components/responses/NotFound'
  /apis:
    get:
      operationId: listApis
      tags:
        - APIs
      summary: List and filter APIs across the network.
      description: |
        The core cross-provider discovery endpoint. Filter by free text, one or many tags
        (`match=any|all`), one or many providers, and/or the artifact types an API must
        publish. Use `artifact_types` together with `fields=...,properties` to return only
        the artifacts you want.
      parameters:
        - $ref: '#/components/parameters/Q'
        - $ref: '#/components/parameters/Tags'
        - $ref: '#/components/parameters/Match'
        - $ref: '#/components/parameters/Providers'
        - $ref: '#/components/parameters/ArtifactTypes'
        - $ref: '#/components/parameters/IndustryFilter'
        - $ref: '#/components/parameters/RegionFilter'
        - $ref: '#/components/parameters/Include'
        - $ref: '#/components/parameters/BandFilter'
        - $ref: '#/components/parameters/MinScore'
        - name: sort
          in: query
          schema:
            type: string
            enum:
              - relevance
              - name
              - provider
              - created
              - score
            default: relevance
        - $ref: '#/components/parameters/Fields'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A page of APIs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiList'
        '400':
          $ref: '#/components/responses/BadRequest'

  /apis/{aid}:
    get:
      operationId: getApi
      tags:
        - APIs
      summary: Get one API by aid.
      description: Returns a single API. Pass `include=content` to inline artifact bodies, optionally narrowed by `artifact_types`.
      parameters:
        - $ref: '#/components/parameters/Aid'
        - $ref: '#/components/parameters/ArtifactTypes'
        - $ref: '#/components/parameters/Include'
        - $ref: '#/components/parameters/Fields'
      responses:
        '200':
          description: The API.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Api'
        '404':
          $ref: '#/components/responses/NotFound'

  /tags:
    get:
      operationId: listTags
      tags:
        - Tags
      summary: List and rank tags.
      description: |
        The tag taxonomy with network-wide ranking metadata (`composite`, `frequency`,
        `breadth`, `quality_lift`, `band`). Default sort is by `composite` score.
      parameters:
        - $ref: '#/components/parameters/Q'
        - name: band
          in: query
          description: Filter by quality band.
          schema:
            type: string
            enum:
              - strong
              - healthy
              - stale
              - weak
        - name: min_api_count
          in: query
          description: Only tags applied to at least this many APIs.
          schema:
            type: integer
            minimum: 0
        - name: sort
          in: query
          schema:
            type: string
            enum:
              - composite
              - frequency
              - breadth
              - quality_lift
              - api_count
              - provider_count
              - name
            default: composite
        - $ref: '#/components/parameters/Fields'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A page of tags.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TagList'

  /tags/{slug}:
    get:
      operationId: getTag
      tags:
        - Tags
      summary: Get one tag, with its linked providers, APIs, and neighbors.
      description: Returns a single tag by slug, including its network-wide ranking metadata, name variants, neighbor tags, and the providers and APIs it is applied to.
      parameters:
        - name: slug
          in: path
          required: true
          description: Tag slug (e.g. `messaging`).
          schema:
            type: string
        - $ref: '#/components/parameters/Fields'
      responses:
        '200':
          description: The tag.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        '404':
          $ref: '#/components/responses/NotFound'

  /industries:
    get:
      operationId: listIndustries
      x-tier: pro
      x-mcp-tool: find_industries
      security:
        - ApiKeyAuth: []
      tags:
        - Industries
      summary: List and filter industries.
      description: The industry taxonomy — verticals grouping providers across the catalog. Filter by free text; sort by provider or API count.
      parameters:
        - $ref: '#/components/parameters/Q'
        - name: sort
          in: query
          description: Sort order.
          schema:
            type: string
            enum:
              - provider_count
              - api_count
              - name
            default: provider_count
        - $ref: '#/components/parameters/Fields'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: List and filter industries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IndustryList'
        '400':
          $ref: '#/components/responses/BadRequest'
  /industries/{slug}:
    get:
      operationId: getIndustry
      x-tier: pro
      x-mcp-tool: get_industry
      security:
        - ApiKeyAuth: []
      tags:
        - Industries
      summary: Get one industry, with its ranked providers.
      description: Returns a single industry by slug, including its aliases, counts, and the member providers ranked by score.
      parameters:
        - name: slug
          in: path
          required: true
          description: Industrie slug (e.g. `media-entertainment`).
          schema:
            type: string
        - $ref: '#/components/parameters/Fields'
      responses:
        '200':
          description: Get one industry, with its ranked providers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Industry'
        '404':
          $ref: '#/components/responses/NotFound'
  /regions:
    get:
      operationId: listRegions
      x-tier: pro
      x-mcp-tool: find_regions
      security:
        - ApiKeyAuth: []
      tags:
        - Regions
      summary: List and filter regions.
      description: The region taxonomy — geographic groupings of providers across the catalog. Filter by free text; sort by provider or API count.
      parameters:
        - $ref: '#/components/parameters/Q'
        - name: sort
          in: query
          description: Sort order.
          schema:
            type: string
            enum:
              - provider_count
              - api_count
              - name
            default: provider_count
        - $ref: '#/components/parameters/Fields'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: List and filter regions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegionList'
        '400':
          $ref: '#/components/responses/BadRequest'
  /regions/{slug}:
    get:
      operationId: getRegion
      x-tier: pro
      x-mcp-tool: get_region
      security:
        - ApiKeyAuth: []
      tags:
        - Regions
      summary: Get one region, with its ranked providers.
      description: Returns a single region by slug, including its aliases, name patterns, counts, and the member providers ranked by score.
      parameters:
        - name: slug
          in: path
          required: true
          description: Region slug (e.g. `southeast-asia`).
          schema:
            type: string
        - $ref: '#/components/parameters/Fields'
      responses:
        '200':
          description: Get one region, with its ranked providers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Region'
        '404':
          $ref: '#/components/responses/NotFound'
  /openapis:
    get:
      operationId: listOpenapis
      tags:
        - Artifact Types
      summary: List openapi specifications across the catalog.
      description: First-class collection of openapi specifications across every provider on the network. Surfaces and normalizes the `OpenAPI` artifact type. Filter by free text, provider, and tags; pass `include=content` to inline each artifact body.
      parameters:
        - $ref: '#/components/parameters/Q'
        - $ref: '#/components/parameters/Providers'
        - $ref: '#/components/parameters/Tags'
        - $ref: '#/components/parameters/Match'
        - $ref: '#/components/parameters/Include'
        - $ref: '#/components/parameters/ArtifactSort'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A page of openapi specifications with owning API and provider context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactList'
        '400':
          $ref: '#/components/responses/BadRequest'
  /asyncapis:
    get:
      operationId: listAsyncapis
      tags:
        - Artifact Types
      summary: List asyncapi specifications across the catalog.
      description: First-class collection of asyncapi specifications across every provider on the network. Surfaces and normalizes the `AsyncAPI` artifact type. Filter by free text, provider, and tags; pass `include=content` to inline each artifact body.
      parameters:
        - $ref: '#/components/parameters/Q'
        - $ref: '#/components/parameters/Providers'
        - $ref: '#/components/parameters/Tags'
        - $ref: '#/components/parameters/Match'
        - $ref: '#/components/parameters/Include'
        - $ref: '#/components/parameters/ArtifactSort'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A page of asyncapi specifications with owning API and provider context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactList'
        '400':
          $ref: '#/components/responses/BadRequest'
  /arazzo:
    get:
      operationId: listArazzo
      tags:
        - Artifact Types
      summary: List arazzo workflows across the catalog.
      description: First-class collection of arazzo workflows across every provider on the network. Surfaces and normalizes the `Arazzo` artifact type. Filter by free text, provider, and tags; pass `include=content` to inline each artifact body.
      parameters:
        - $ref: '#/components/parameters/Q'
        - $ref: '#/components/parameters/Providers'
        - $ref: '#/components/parameters/Tags'
        - $ref: '#/components/parameters/Match'
        - $ref: '#/components/parameters/Include'
        - $ref: '#/components/parameters/ArtifactSort'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A page of arazzo workflows with owning API and provider context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactList'
        '400':
          $ref: '#/components/responses/BadRequest'
  /postman:
    get:
      operationId: listPostman
      tags:
        - Artifact Types
      summary: List postman collections across the catalog.
      description: First-class collection of postman collections across every provider on the network. Surfaces and normalizes the `PostmanCollection` artifact type. Filter by free text, provider, and tags; pass `include=content` to inline each artifact body.
      parameters:
        - $ref: '#/components/parameters/Q'
        - $ref: '#/components/parameters/Providers'
        - $ref: '#/components/parameters/Tags'
        - $ref: '#/components/parameters/Match'
        - $ref: '#/components/parameters/Include'
        - $ref: '#/components/parameters/ArtifactSort'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A page of postman collections with owning API and provider context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactList'
        '400':
          $ref: '#/components/responses/BadRequest'
  /collections:
    get:
      operationId: listCollections
      tags:
        - Artifact Types
      summary: List api collections across the catalog.
      description: First-class collection of api collections across every provider on the network. Surfaces and normalizes the `Collection`, `Collections` artifact types. Filter by free text, provider, and tags; pass `include=content` to inline each artifact body.
      parameters:
        - $ref: '#/components/parameters/Q'
        - $ref: '#/components/parameters/Providers'
        - $ref: '#/components/parameters/Tags'
        - $ref: '#/components/parameters/Match'
        - $ref: '#/components/parameters/Include'
        - $ref: '#/components/parameters/ArtifactSort'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A page of api collections with owning API and provider context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactList'
        '400':
          $ref: '#/components/responses/BadRequest'
  /graphql:
    get:
      operationId: listGraphql
      tags:
        - Artifact Types
      summary: List graphql schemas across the catalog.
      description: First-class collection of graphql schemas across every provider on the network. Surfaces and normalizes the `GraphQL` artifact type. Filter by free text, provider, and tags; pass `include=content` to inline each artifact body.
      parameters:
        - $ref: '#/components/parameters/Q'
        - $ref: '#/components/parameters/Providers'
        - $ref: '#/components/parameters/Tags'
        - $ref: '#/components/parameters/Match'
        - $ref: '#/components/parameters/Include'
        - $ref: '#/components/parameters/ArtifactSort'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: A page of graphql schemas with owning API and provider context.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactList'
        '400':
          $ref: '#/components/responses/BadRequest'
  /json-schemas:
    get:
      operationId: listJsonSchemas
      tags:
        - Artifact Types
      summary: List json schema definitions across the catalog.
