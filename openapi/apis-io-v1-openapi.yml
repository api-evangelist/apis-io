      description: Decompose a domain into capabilities, then get the best-rated catalog provider per capability assembled into a stack. FREE returns a preview (top pick per capability); PRO returns alternatives, per-pick artifact gaps, and an exportable APIs.json + Arazzo hint.
      parameters:
        - name: capabilities
          in: query
          required: true
          description: Comma-separated capabilities the stack needs, e.g. `payments,email,identity,observability`.
          schema:
            type: string
        - name: region
          in: query
          description: Optional region slug to prefer, e.g. `europe`.
          schema:
            type: string
      responses:
        '200':
          description: A recommended stack (preview for free callers; full for Pro).
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          $ref: '#/components/responses/BadRequest'

components:

  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: Optional in v1. Defined so metering/rate-tiers can be enabled later without a breaking change.

  parameters:
    Q:
      name: q
      in: query
      description: Free-text query over name and description (and tags where applicable).
      schema:
        type: string
    Tags:
      name: tags
      in: query
      description: Comma-separated tags to filter by. Tag names are Title Case (e.g. Messaging); lowercase slugs (e.g. messaging) are also accepted.
      style: form
      explode: false
      example:
        - Messaging
        - Authentication
      schema:
        type: array
        items:
          type: string
    Match:
      name: match
      in: query
      description: Whether results must match `any` (default) or `all` of the supplied tags.
      schema:
        type: string
        enum:
          - any
          - all
        default: any
    Providers:
      name: providers
      in: query
      description: Comma-separated provider slugs to scope results to.
      style: form
      explode: false
      schema:
        type: array
        items:
          type: string
    ArtifactTypes:
      name: artifact_types
      in: query
      description: Comma-separated artifact types. Filters which artifacts are returned and (on list endpoints) which APIs qualify.
      style: form
      explode: false
      schema:
        type: array
        items:
          $ref: '#/components/schemas/ArtifactType'
    Include:
      name: include
      in: query
      description: Extra data to embed. `content` fetches and inlines artifact bodies.
      style: form
      explode: false
      schema:
        type: array
        items:
          type: string
          enum:
            - content
    Fields:
      name: fields
      in: query
      description: Sparse fieldset — comma-separated property names to return.
      style: form
      explode: false
      schema:
        type: array
        items:
          type: string
    ProviderSlug:
      name: slug
      in: path
      required: true
      description: Provider slug (e.g. `twilio`).
      schema:
        type: string
    Aid:
      name: aid
      in: path
      required: true
      description: API id in `provider:api-slug` form (e.g. `twilio:twilio-accounts-api`).
      schema:
        type: string
        pattern: '^[^:]+:[^:]+$'
    Page:
      name: page
      in: query
      description: 1-based page number.
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      description: Items per page.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25

    ArtifactSort:
      name: sort
      in: query
      description: Sort order.
      schema:
        type: string
        enum:
          - relevance
          - provider
          - name
          - updated
        default: relevance
    BandFilter:
      name: band
      in: query
      description: Filter by one or more rating bands.
      style: form
      explode: false
      schema:
        type: array
        items:
          $ref: '#/components/schemas/Band'
    MinScore:
      name: min_score
      in: query
      description: Minimum composite score (0–100).
      schema:
        type: number
        minimum: 0
        maximum: 100
    MaxScore:
      name: max_score
      in: query
      description: Maximum composite score (0–100).
      schema:
        type: number
        minimum: 0
        maximum: 100
    TrendFilter:
      name: trend
      in: query
      description: Filter by trend marker.
      schema:
        $ref: '#/components/schemas/Trend'
    FacetFilter:
      name: facet
      in: query
      description: Facet to apply `min_facet` against.
      schema:
        $ref: '#/components/schemas/FacetName'
    MinFacet:
      name: min_facet
      in: query
      description: Minimum score (0–100) for the facet named by `facet`.
      schema:
        type: number
        minimum: 0
        maximum: 100
    IndustryFilter:
      name: industry
      in: query
      description: Filter by one or more industry slugs.
      style: form
      explode: false
      schema:
        type: array
        items:
          type: string
    RegionFilter:
      name: region
      in: query
      description: Filter by one or more region slugs.
      style: form
      explode: false
      schema:
        type: array
        items:
          type: string
  responses:
    BadRequest:
      description: Malformed request (bad parameter value).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://apis.io/problems/invalid-parameter
            title: Invalid parameter
            status: 400
            detail: "`match` must be one of: any, all."
            instance: /v1/search
            parameter: match
    NotFound:
      description: Resource not found.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://apis.io/problems/not-found
            title: Resource not found
            status: 404
            detail: No API found with aid `twilio:nope`.
            instance: /v1/apis/twilio:nope
    UpgradeRequired:
      description: This operation requires the Pro tier. Send a valid `X-API-Key` for a paid tier.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://apis.io/problems/upgrade-required
            title: Upgrade required
            status: 403
            detail: The areas endpoint requires the Pro or Business tier.
            instance: /v1/areas

  schemas:

    Meta:
      type: object
      description: Pagination and echoed-query metadata for collection responses.
      properties:
        total:
          type: integer
          description: Total matching items across all pages.
        page:
          type: integer
        limit:
          type: integer
        pages:
          type: integer
          description: Total number of pages.
        query:
          type: object
          additionalProperties: true
          description: The effective query parameters, echoed back.
      required:
        - total
        - page
        - limit
        - pages

    Link:
      type: object
      properties:
        type:
          type: string
          description: Link/relationship type (e.g. Documentation
          Website:
          GitHub:
          Pricing).:
        url:
          type: string
          format: uri
        title:
          type: string
      required:
        - type
        - url

    ArtifactType:
      type: string
      description: |
        The type of an artifact. Open enumeration — the catalog carries ~50 types; the most
        common are listed here. Unknown values are allowed.
      examples:
        - OpenAPI
        - JSONSchema
        - Postman
      enum:
        - Documentation
        - OpenAPI
        - JSONSchema
        - JSONStructure
        - JSONLD
        - Example
        - GettingStarted
        - APIReference
        - Authentication
        - SDK
        - GitHubRepository
        - Reference
        - Pricing
        - CodeExamples
        - Website
        - RateLimits
        - Portal
        - AsyncAPI
        - Arazzo
        - GitHub
        - ChangeLog
        - SourceCode
        - Repository
        - FAQ
        - SignUp
        - GraphQL
        - Plans
        - Vocabulary
        - Specification
        - Tutorials
        - Sandbox
        - FinOps
        - SpectralRules
        - Console
        - GitHubOrganization
        - ReleaseNotes
        - Support
        - TermsOfService
        - Rules
        - Webhooks
        - Quickstart
        - ProductPage
        - Capabilities
        - PostmanCollection
        - Collection
        - KubernetesCRD
        - Hub
        - NaftikoCapability
      x-extensible-enum: true

    Artifact:
      type: object
      description: A machine- or human-readable artifact attached to an API.
      properties:
        id:
          type: string
          description: Stable artifact id, `aid::type::n`.
          examples:
            - 'twilio:twilio-accounts-api::OpenAPI::0'
        type:
          $ref: '#/components/schemas/ArtifactType'
        name:
          type: string
          description: Optional human label for the artifact.
        url:
          type: string
          format: uri
          description: Reference to the artifact.
        # Owning context — populated on cross-catalog artifact results.
        aid:
          type: string
          description: aid of the owning API.
        provider_slug:
          type: string
        provider_name:
          type: string
        # Populated only when include=content.
        content:
          type: string
          description: Inlined artifact body. Present only when include=content.
        content_type:
          type: string
          description: Media type of the inlined content (e.g. application/yaml).
      required:
        - type
        - url

    Api:
      type: object
      description: An individual API owned by a provider.
      properties:
        aid:
          type: string
          examples:
            - 'twilio:twilio-accounts-api'
        name:
          type: string
        description:
          type: string
        provider_slug:
          type: string
        provider_name:
          type: string
        baseURL:
          type: string
          format: uri
        humanURL:
          type: string
          format: uri
          description: Human-facing documentation entry point.
        tags:
          type: array
          description: Tag names in Title Case (e.g. Messaging, Authentication).
          items:
            type: string
          examples:
            -   - Messaging
                - Authentication
        properties:
          type: array
          description: The API's artifacts.
          items:
            $ref: '#/components/schemas/Artifact'
        sibling_apis:
          type: array
          description: Other APIs published by the same provider.
          items:
            type: object
            properties:
              name:
                type: string
              slug:
                type: string
        overview:
          type: string
          description: Narrative overview (markdown).
      required:
        - aid
        - name
        - provider_slug

    Provider:
      type: object
      description: An organization publishing one or more APIs.
      properties:
        slug:
          type: string
          examples:
            - twilio
        name:
          type: string
        description:
          type: string
        api_count:
          type: integer
        image:
          type: string
          format: uri
        created:
          type: string
          format: date
        common:
          type: array
          description: Provider-wide links (Website, Docs, Pricing, GitHub, social, …).
          items:
            $ref: '#/components/schemas/Link'
        apis:
          type: array
          description: Summary list of the provider's APIs.
          items:
            type: object
            properties:
              name:
                type: string
              slug:
                type: string
              description:
                type: string
        tags:
          type: array
          description: Tag names in Title Case (e.g. Messaging, Authentication).
          items:
            type: string
          examples:
            -   - Messaging
                - Authentication
        score:
          $ref: '#/components/schemas/ProviderScore'
      required:
        - slug
        - name

    TagRef:
      type: object
      properties:
        slug:
          type: string
        name:
          type: string

    Tag:
      type: object
      description: A tag in the taxonomy, with network-wide ranking metadata.
      properties:
        slug:
          type: string
          examples:
            - messaging
        name:
          type: string
          examples:
            - Messaging
        composite:
          type: number
          description: Composite ranking score.
        band:
          type: string
          enum:
            - strong
            - healthy
            - stale
            - weak
        frequency:
          type: number
        breadth:
          type: number
        quality_lift:
          type: number
        provider_count:
          type: integer
        api_count:
          type: integer
        variants:
          type: array
          items:
            type: string
        neighbors:
          type: array
          description: Related tags.
          items:
            $ref: '#/components/schemas/TagRef'
        providers:
          type: array
          items:
            $ref: '#/components/schemas/Provider'
        apis:
          type: array
          items:
            type: object
            properties:
              provider:
                type: string
              slug:
                type: string
              name:
                type: string
      required:
        - slug
        - name

    ProviderList:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/Provider'
      required:
        - meta
        - data

    ApiList:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/Api'
      required:
        - meta
        - data

    TagList:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
      required:
        - meta
        - data

    ArtifactList:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/Artifact'
      required:
        - meta
        - data

    SearchResults:
      type: object
      description: |
        Unified search envelope. `data` holds objects of the kind named by `meta.return`
        (apis | providers | tags | artifacts).
      properties:
        meta:
          allOf:
            - $ref: '#/components/schemas/Meta'
            - type: object
              properties:
                return:
                  type: string
                  enum:
                    - apis
                    - providers
                    - tags
                    - artifacts
        data:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/Api'
              - $ref: '#/components/schemas/Provider'
              - $ref: '#/components/schemas/Tag'
              - $ref: '#/components/schemas/Artifact'
      required:
        - meta
        - data

    Problem:
      type: object
      description: |
        A Problem Details object per [RFC 9457](https://www.rfc-editor.org/rfc/rfc9457).
        Served as `application/problem+json`. Extension members (e.g. `parameter`) may be
        added alongside the standard fields.
      properties:
        type:
          type: string
          format: uri
          default: about:blank
          description: A URI identifying the problem type; dereferences to human-readable docs.
          examples:
            - 'https://apis.io/problems/invalid-parameter'
        title:
          type: string
          description: A short, human-readable summary of the problem type.
          examples:
            - Invalid parameter
        status:
          type: integer
          minimum: 100
          maximum: 599
          description: The HTTP status code, repeated for convenience.
          examples:
            - 400
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence.
        instance:
          type: string
          format: uri-reference
          description: A URI reference identifying the specific occurrence (typically the request path).
        parameter:
          type: string
          description: Extension member — the offending query/path parameter, when applicable.
      required:
        - type
        - title
        - status
      additionalProperties: true
    Band:
      type: string
      description: Rating band derived from the composite score.
      enum:
        - exemplar
        - strong
        - developing
        - thin
        - minimal
    Trend:
      type: string
      description: Week-over-week movement in composite score (±5 thresholds).
      enum:
        - rising
        - flat
        - falling
    FacetName:
      type: string
      description: One of the six rating facets.
      enum:
        - discoverability
        - contract_quality
        - governance
        - operational_transparency
        - developer_ergonomics
        - commercial_clarity
    Facets:
      type: object
      description: The six facet scores, each 0–100.
      properties:
        discoverability:
          type: number
          minimum: 0
          maximum: 100
          description: Discoverability facet score (weight 0.10).
        contract_quality:
          type: number
          minimum: 0
          maximum: 100
          description: Contract Quality facet score (weight 0.25).
        governance:
          type: number
          minimum: 0
          maximum: 100
          description: Governance facet score (weight 0.12).
        operational_transparency:
          type: number
          minimum: 0
          maximum: 100
          description: Operational Transparency facet score (weight 0.13).
        developer_ergonomics:
          type: number
          minimum: 0
          maximum: 100
          description: Developer Ergonomics facet score (weight 0.20).
        commercial_clarity:
          type: number
          minimum: 0
          maximum: 100
          description: Commercial Clarity facet score (weight 0.20).
    ProviderScore:
      type: object
      description: A provider's rating, rubric v0.3.
      properties:
        composite:
          type: number
          minimum: 0
          maximum: 100
          description: Weighted composite of the six facets.
          examples:
            - 66.3
        band:
          $ref: '#/components/schemas/Band'
        trend:
          $ref: '#/components/schemas/Trend'
        delta:
          type: number
          description: Composite change since the previous snapshot.
          examples:
            - 0.0
        previous_composite:
          type: number
          minimum: 0
          maximum: 100
        scored_at:
          type: string
          format: date
        schema_version:
          type: string
          examples:
            - '0.3'
        facets:
          $ref: '#/components/schemas/Facets'
      required:
        - composite
        - band
    RatingEntry:
      type: object
      description: A ranked provider in the ratings leaderboard.
      properties:
        rank:
          type: integer
          description: 1-based position in the filtered, score-sorted list.
        provider_slug:
          type: string
        provider_name:
          type: string
        composite:
          type: number
          minimum: 0
          maximum: 100
        band:
          $ref: '#/components/schemas/Band'
        trend:
          $ref: '#/components/schemas/Trend'
        facets:
          $ref: '#/components/schemas/Facets'
      required:
        - provider_slug
        - composite
        - band
    RatingList:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/RatingEntry'
      required:
        - meta
        - data
    Rubric:
      type: object
      description: The rating rubric — bands, facet weights, and trend thresholds.
      properties:
        schema_version:
          type: string
          examples:
            - '0.3'
        bands:
          type: array
          items:
            type: object
            properties:
              label:
                $ref: '#/components/schemas/Band'
              min:
                type: number
                description: Inclusive lower bound of the composite range.
              description:
                type: string
        facets:
          type: array
          items:
            type: object
            properties:
              name:
                $ref: '#/components/schemas/FacetName'
              label:
                type: string
              weight:
                type: number
                description: Share of the composite (the six weights sum to 1.0).
              description:
                type: string
        trending:
          type: object
          properties:
            rising_threshold:
              type: number
              examples:
                - 5
            falling_threshold:
              type: number
              examples:
                - -5
    RankedProvider:
      type: object
      description: A provider summary as it appears in an industry or region membership list.
      properties:
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        api_count:
          type: integer
        image:
          type: string
          format: uri
        score_band:
          $ref: '#/components/schemas/Band'
        score_composite:
          type: number
          minimum: 0
          maximum: 100
      required:
        - slug
        - name
    Industry:
      type: object
      description: An industry vertical grouping providers across the catalog.
      properties:
        slug:
          type: string
          examples:
            - media-entertainment
        name:
          type: string
          examples:
            - Media & Entertainment
        short:
          type: string
          description: One-line summary.
        description:
          type: string
        aliases:
          type: array
          items:
            type: string
        provider_count:
          type: integer
        api_count:
          type: integer
        providers:
          type: array
          description: Member providers, ranked by score. Returned on the single-industry endpoint; omitted from list responses by default.
          items:
            $ref: '#/components/schemas/RankedProvider'
      required:
        - slug
        - name
    Region:
      type: object
      description: A geographic region grouping providers across the catalog.
      properties:
        slug:
          type: string
          examples:
            - southeast-asia
        name:
          type: string
          examples:
            - Southeast Asia
        short:
          type: string
          description: One-line summary.
        description:
          type: string
        aliases:
          type: array
          items:
            type: string
        name_patterns:
          type: array
          description: Country/nationality strings used to infer regional membership.
          items:
            type: string
        provider_count:
          type: integer
        api_count:
          type: integer
        providers:
          type: array
          description: Member providers, ranked by score. Returned on the single-region endpoint; omitted from list responses by default.
          items:
            $ref: '#/components/schemas/RankedProvider'
      required:
        - slug
        - name
    IndustryList:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/Industry'
      required:
        - meta
        - data
    RegionList:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/Region'
      required:
        - meta
        - data
    Area:
      type: object
      description: A curated API Evangelist area — a topic collection with its own scored provider index and dedicated site.
      properties:
        slug:
          type: string
          examples:
            - authentication
        name:
          type: string
          examples:
            - Authentication
        short:
          type: string
          description: One-line summary.
        description:
          type: string
        aliases:
          type: array
          items:
            type: string
        area_url:
          type: string
          description: The area's dedicated site.
          examples:
            - https://authentication.apievangelist.com
        area_host:
          type: string
        icon:
          type: string
        provider_count:
          type: integer
        api_count:
          type: integer
        providers:
          type: array
          description: Member providers, ranked by score. Returned on the single-area endpoint; omitted from list responses by default.
          items:
            $ref: '#/components/schemas/RankedProvider'
      required:
        - slug
        - name
    AreaList:
      type: object
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/Area'
      required:
        - meta
        - data
