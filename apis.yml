apis:
- aid: apis-io:search-api
  name: APIs.io Search API
  description: The APIs.io Search API allows developers to search for APIs across all indexed APIs.json files using keywords
    or phrases, and to submit new APIs to the index by providing a valid APIs.json document. The API supports pagination,
    filtering, and returns results with name, description, tags, score, and URLs. Authentication is handled via the separate
    Authentication API which converts GitHub Personal Access Tokens into API keys.
