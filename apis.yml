apis:
  - aid: apis-io:search-api
    name: APIs.io Search API
    description: >-
      The APIs.io Search API allows you to search for APIs, properties, and
      maintainers across all indexed APIs.json files. It provides endpoints for
      keyword search, filtering by property type or maintainer, and submitting
      new APIs to the index.
    humanURL: https://developer.apis.io/
    baseURL: https://search-api.apis.io
