aid: apis-io
name: APIs.io
description: APIs.io is an open source API search engine and directory that uses APIs.json files to discover, index, and
  catalog APIs across the web. Built on the APIs.json specification, it provides a searchable entry point for developers
  to find public APIs by keyword, resource, action, persona, domain, and schema. The platform indexes 779 providers,
  3,188 APIs, 587 capabilities, 36,602 schemas, 49 event specs, 2,078 vocabularies, and 450 rulesets. It is maintained
  by Kin Lane, Nicolas Grenier, and Steven Willmott and supports both API producers (submitting APIs) and API consumers
  (discovering APIs). APIs.io uses a Spectral-powered rating system to evaluate API documentation quality.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - API Aggregation
  - API Directory
  - API Discovery
  - API Indexing
  - API Rating
  - API Search
  - APIs.json
  - Search Engine
